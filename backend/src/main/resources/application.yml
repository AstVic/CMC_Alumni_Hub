# Common configuration shared by all profiles.
# The active profile is selected via APP_PROFILE (defaults to "local").
# Environment-specific values live in application-local.yml / application-prod.yml.
spring:
  application:
    name: cmc-alumni-hub
  profiles:
    active: ${APP_PROFILE:local}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      # Schema is owned by Flyway; Hibernate only validates it.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

# Application-specific settings (bound via @ConfigurationProperties).
app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
  # Load demo alumni/cards/questions on startup (demo only, never in prod).
  seed-demo: ${APP_SEED_DEMO:false}
  # Initial admin created on first start if no admin exists (all environments).
  admin:
    email: ${ADMIN_EMAIL:admin@cmc.msu.ru}
    password: ${ADMIN_PASSWORD:admin123}
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:60}
    refresh-token-ttl-days: ${JWT_REFRESH_TTL_DAYS:7}
  invite:
    expiry-days: ${INVITE_EXPIRY_DAYS:7}
  mail:
    from: ${SMTP_FROM:CMC Alumni Hub <no-reply@cmc-alumni-hub.local>}
  storage:
    upload-dir: ${STORAGE_UPLOAD_DIR:./uploads}
  moderation:
    provider: ${MODERATION_PROVIDER:rule-based}   # rule-based | ai
    ai-api-url: ${MODERATION_AI_API_URL:}
    ai-api-key: ${MODERATION_AI_API_KEY:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
