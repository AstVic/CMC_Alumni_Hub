# Local development profile.
# Boots against a local/dockerised PostgreSQL. Verbose logging, SQL visible.
# Falls back to the logging email service when SMTP is not configured.
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/alumnihub}
    username: ${DB_USERNAME:alumnihub}
    password: ${DB_PASSWORD:alumnihub}

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  # Local runs load the demo dataset by default (override with APP_SEED_DEMO=false).
  seed-demo: ${APP_SEED_DEMO:true}
  jwt:
    # Dev-only default secret. NEVER used in production (prod requires JWT_SECRET).
    secret: ${JWT_SECRET:local-dev-secret-change-me-please-0123456789-abcdef}

logging:
  level:
    ru.msu.cmc.alumnihub: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG
