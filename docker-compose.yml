# Local development stack: PostgreSQL + backend (profile "local") + frontend.
# Usage:
#   cp .env.example .env
#   docker compose up --build
name: cmc-alumni-hub

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alumnihub}
      POSTGRES_USER: ${POSTGRES_USER:-alumnihub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alumnihub}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alumnihub}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_PROFILE: local
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-alumnihub}
      DB_USERNAME: ${POSTGRES_USER:-alumnihub}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-alumnihub}
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-me-please-0123456789-abcdef}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:5173}
      INVITE_EXPIRY_DAYS: ${INVITE_EXPIRY_DAYS:-7}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-CMC Alumni Hub <no-reply@cmc-alumni-hub.local>}
      STORAGE_UPLOAD_DIR: /app/uploads
      MODERATION_PROVIDER: ${MODERATION_PROVIDER:-rule-based}
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  uploads_data:
