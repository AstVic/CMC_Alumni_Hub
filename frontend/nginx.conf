server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA history fallback: unknown routes serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service (production compose).
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded photos are stored by the backend and referenced as /uploads/...
    location /uploads/ {
        proxy_pass http://backend:8080/uploads/;
        proxy_set_header Host $host;
    }

    # The only externally exposed Actuator endpoint.
    location = /actuator/health {
        proxy_pass http://backend:8080/actuator/health;
        proxy_set_header Host $host;
    }

    # Cache static assets.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
