# Production stack: backend (profile "prod") + frontend.
# NO local PostgreSQL — the database is a managed cloud instance reached via
# DB_URL (with sslmode=require). The frontend nginx proxies /api to the backend.
#
# Usage:
#   cp .env.example .env      # fill in cloud DB_URL, JWT_SECRET, SMTP_*, etc.
#   docker compose -f docker-compose.prod.yml up --build -d
name: cmc-alumni-hub-prod

services:
  backend:
    build: ./backend
    environment:
      APP_PROFILE: prod
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES:-60}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-7}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # Production: never load demo data (clean start).
      APP_SEED_DEMO: ${APP_SEED_DEMO:-false}
      INVITE_EXPIRY_DAYS: ${INVITE_EXPIRY_DAYS:-7}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      STORAGE_UPLOAD_DIR: /app/uploads
      MODERATION_PROVIDER: ${MODERATION_PROVIDER:-rule-based}
      MODERATION_AI_API_URL: ${MODERATION_AI_API_URL:-}
      MODERATION_AI_API_KEY: ${MODERATION_AI_API_KEY:-}
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        # Served same-origin; nginx proxies /api to the backend service.
        VITE_API_URL: /api
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  uploads_data:
